name: Daily CPAList Digest

on:
  schedule:
    # 05:07 UTC = ~midnight EST (offset avoids GitHub Actions' congested :00 window)
    - cron: "7 5 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send CPAList digest email
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/daily" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            --retry 2 \
            --retry-delay 15
          echo "Response:"
          cat response.json
