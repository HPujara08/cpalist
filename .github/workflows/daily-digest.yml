name: Daily CPAList Digest

on:
  schedule:
    # 05:00 UTC = midnight EST (midnight EST in winter; 1am EDT in summer)
    - cron: "0 5 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send CPAList digest email
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/daily" \
            -H "Content-Type: application/json" \
            --max-time 60
          echo "Response:"
          cat response.json
