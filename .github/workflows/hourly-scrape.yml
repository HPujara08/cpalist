name: Hourly Batch Scrape

on:
  schedule:
    # Every hour at :00 UTC
    - cron: "0 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger batch scrape
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/scrape/batch" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            --retry 2 \
            --retry-delay 10
          echo "Response:"
          cat response.json
